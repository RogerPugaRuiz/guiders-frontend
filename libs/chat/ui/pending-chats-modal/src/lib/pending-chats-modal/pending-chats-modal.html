@if (isOpen()) {
  <div class="modal-overlay" (click)="onClose()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Chats Pendientes - {{ data().visitor.name || data().visitor.email }}</h3>
        <button class="close-button" (click)="onClose()">×</button>
      </div>

      <div class="modal-body">
        @if (data().pendingChatIds.length === 0) {
          <p>No hay chats pendientes para este visitante.</p>
        } @else {
          <div class="pending-chats-list">
            @for (chatId of data().pendingChatIds; track chatId) {
              <div class="pending-chat-item">
                <div class="chat-info">
                  <span class="chat-id">Chat ID: {{ chatId }}</span>
                  <span class="chat-status">Pendiente</span>
                </div>
                <div class="chat-actions">
                  <button
                    class="take-button"
                    [disabled]="loading()"
                    (click)="onTakeChat(chatId)"
                  >
                    @if (loading()) {
                      <svg class="spinner" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 11-6.219-8.56"/>
                      </svg>
                      Procesando...
                    } @else {
                      Tomar Chat
                    }
                  </button>
                  <button
                    class="transfer-button"
                    [disabled]="loading()"
                    (click)="onTransferChat(chatId, 'user-123')"
                  >
                    @if (loading()) {
                      <svg class="spinner" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 11-6.219-8.56"/>
                      </svg>
                      Procesando...
                    } @else {
                      Transferir
                    }
                  </button>
                </div>
              </div>
            }
          </div>
        }
      </div>
    </div>
  </div>
}
