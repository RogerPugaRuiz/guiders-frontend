<button class="conversation-item" 
        [class.conversation-item--selected]="isSelected()"
        (click)="onConversationClick()"
        [attr.aria-label]="'Seleccionar conversación con ' + getChatDisplayName()"
        type="button">
  <div class="conversation-item__avatar">
    <!-- Mostrar imagen si avatar es una URL, sino el SVG de usuario blanco sobre círculo azul -->
    <ng-container *ngIf="isAvatarUrl(); else svgFallback">
      <img [src]="getChatAvatar()" alt="Avatar" loading="lazy" />
    </ng-container>
    <ng-template #svgFallback>
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="icon icon-tabler icon-tabler-filled icon-tabler-user" aria-hidden="true" focusable="false">
        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
        <path d="M12 2a5 5 0 1 1 -5 5l.005 -.217a5 5 0 0 1 4.995 -4.783z" />
        <path d="M14 14a5 5 0 0 1 5 5v1a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-1a5 5 0 0 1 5 -5h4z" />
      </svg>
    </ng-template>
  </div>
  <div class="conversation-item__content">
    <div class="conversation-item__header">
      <h3 class="conversation-item__name">{{ getChatDisplayName() }}</h3>
      <time class="conversation-item__time" 
            [attr.datetime]="getChatDatetime()">
        {{ formatChatTime() }}
      </time>
    </div>
    <div class="conversation-item__footer">
      <p class="conversation-item__preview">{{ getChatPreview() }}</p>
      <guiders-unread-badge
        [count]="conversation().unreadCount"
        size="small"
        variant="danger"
      />
    </div>
  </div>
</button>
