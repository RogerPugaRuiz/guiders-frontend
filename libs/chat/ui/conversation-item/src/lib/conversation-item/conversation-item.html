<button class="conversation-item"
        [class.conversation-item--selected]="isSelected()"
        (click)="onConversationClick()"
        [attr.aria-label]="'Seleccionar conversación con ' + getChatDisplayName()"
        type="button">
  <!-- Avatar con inicial y badge de presencia -->
  <guiders-avatar
    [userId]="visitorId()"
    [name]="visitorName()"
    [email]="visitorEmail()"
    [presenceStatus]="participantPresenceStatus()"
    size="medium"
  />
  <div class="conversation-item__content">
    <div class="conversation-item__header">
      <h3 class="conversation-item__name">{{ getChatDisplayName() }}</h3>
      <time class="conversation-item__time" 
            [attr.datetime]="getChatDatetime()">
        {{ formatChatTime() }}
      </time>
    </div>
    <div class="conversation-item__footer">
      <p class="conversation-item__preview">{{ getChatPreview() }}</p>
      <guiders-unread-badge
        [count]="conversation().unreadCount"
        size="small"
        variant="danger"
      />
    </div>
  </div>
</button>
