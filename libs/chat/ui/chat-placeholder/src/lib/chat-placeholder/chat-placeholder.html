<div class="guiders-chat-placeholder">
  <div class="guiders-chat-placeholder__header">
    <div class="guiders-chat-placeholder__chat-info">
      <h2 class="guiders-chat-placeholder__title">{{ getChatDisplayName() }}</h2>
      <div class="guiders-chat-placeholder__status" 
           [attr.data-status]="selectedChat.status">
        <guiders-icon 
          [name]="getStatusIconName()" 
          size="sm" 
          class="guiders-chat-placeholder__status-icon" />
        <span class="guiders-chat-placeholder__status-text">
          {{ getChatStatusInfo().label }}
        </span>
      </div>
    </div>
    
    @if (showActions) {
      <div class="guiders-chat-placeholder__actions">
        <guiders-button 
          variant="ghost" 
          size="small"
          [ariaLabel]="'Configuración del chat'"
          (click)="onSettingsClick()">
          <guiders-icon name="settings" size="sm" />
        </guiders-button>
        
        <guiders-button 
          variant="ghost" 
          size="small"
          [ariaLabel]="'Cerrar chat'"
          (click)="onCloseChat()">
          <guiders-icon name="close" size="sm" />
        </guiders-button>
      </div>
    }
  </div>
  
  <div class="guiders-chat-placeholder__content">
    <div class="guiders-chat-placeholder__message">
      <guiders-icon 
        name="message-square" 
        size="xl" 
        class="guiders-chat-placeholder__message-icon" />
      
      <h3 class="guiders-chat-placeholder__message-title">
        Chat con {{ getChatDisplayName() }}
      </h3>
      
      <p class="guiders-chat-placeholder__message-text">
        {{ placeholderMessage }}
      </p>
      
      @if (selectedChat.chatId) {
        <div class="guiders-chat-placeholder__debug">
          <small class="guiders-chat-placeholder__debug-text">
            ID: {{ selectedChat.chatId }}
          </small>
        </div>
      }
    </div>
  </div>
</div>
