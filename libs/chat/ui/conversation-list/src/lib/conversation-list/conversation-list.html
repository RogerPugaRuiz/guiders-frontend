<div class="guiders-conversation-list" #list>
  <ng-container *ngIf="conversations?.length; else emptyState">
    <guiders-conversation-item
      *ngFor="let conversation of conversations"
      [conversation]="conversation"
      [isSelected]="conversation.chatId === selectedConversationId"
      [participantPresenceStatus]="presenceMap[conversation.chatId]"
      (conversationSelected)="onSelect(conversation)"
      class="conversation-item"
      [ngClass]="{ 'is-selected': conversation.chatId === selectedConversationId }"
    ></guiders-conversation-item>
  </ng-container>
  <ng-template #emptyState>
    <div class="guiders-conversation-list__empty">No hay conversaciones</div>
  </ng-template>
</div>
