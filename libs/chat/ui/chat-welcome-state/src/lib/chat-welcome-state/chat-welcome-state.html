<div class="guiders-chat-welcome-state">
  <div class="guiders-chat-welcome-state__content">
    <img
      src="/images/chat-welcome.png"
      alt="Ilustración de dos personas sosteniendo burbujas de conversación"
      class="guiders-chat-welcome-state__illustration"
    />

    <h3 class="guiders-chat-welcome-state__title">{{ title }}</h3>

    <p class="guiders-chat-welcome-state__description">
      {{ description }}
    </p>

    @if (showNewChatButton) {
      <guiders-button
        variant="primary"
        size="medium"
        [ariaLabel]="newChatButtonText"
        class="guiders-chat-welcome-state__new-chat-btn"
        (click)="onNewChatClick()">
        {{ newChatButtonText }}
      </guiders-button>
    }
  </div>
</div>
