<div class="message-input">
  <!-- Sección de sugerencias de IA -->
  @if (showSuggestions()) {
    <div class="message-input__suggestions">
      <div class="message-input__suggestions-header">
        <span class="message-input__suggestions-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
            <path d="M8 15C12.8747 15 15 12.949 15 8C15 12.949 17.1104 15 22 15C17.1104 15 15 17.1104 15 22C15 17.1104 12.8747 15 8 15Z"/>
            <path d="M2 6.5C5.13376 6.5 6.5 5.18153 6.5 2C6.5 5.18153 7.85669 6.5 11 6.5C7.85669 6.5 6.5 7.85669 6.5 11C6.5 7.85669 5.13376 6.5 2 6.5Z"/>
          </svg>
          Sugerencias IA
        </span>
        <button
          type="button"
          class="message-input__suggestions-close"
          (click)="hideSuggestions()"
          aria-label="Cerrar sugerencias">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      @if (isLoadingSuggestions()) {
        <div class="message-input__suggestions-loading">
          <span class="message-input__suggestions-spinner"></span>
          <span>Generando sugerencias...</span>
        </div>
      } @else if (hasSuggestions()) {
        <div class="message-input__suggestions-list">
          @for (suggestion of suggestions(); track $index) {
            <button
              type="button"
              class="message-input__suggestion-chip"
              (click)="selectSuggestion(suggestion)"
              title="Usar esta sugerencia">
              {{ suggestion }}
            </button>
          }
        </div>
      } @else {
        <div class="message-input__suggestions-empty">
          No hay sugerencias disponibles
        </div>
      }
    </div>
  }

  <div class="message-input__input-wrapper">
    <!-- Botón de sugerencias/mejora IA -->
    <button
      type="button"
      class="message-input__suggestions-button"
      [class.message-input__suggestions-button--active]="showSuggestions()"
      [class.message-input__suggestions-button--loading]="isImprovingText()"
      (click)="toggleSuggestions()"
      [disabled]="!chatId() || isImprovingText()"
      [title]="messageText.trim() ? 'Mejorar texto con IA' : 'Obtener sugerencias de respuesta con IA'"
      aria-label="IA">
      @if (isImprovingText()) {
        <span class="message-input__button-spinner"></span>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
          <path d="M8 15C12.8747 15 15 12.949 15 8C15 12.949 17.1104 15 22 15C17.1104 15 15 17.1104 15 22C15 17.1104 12.8747 15 8 15Z"/>
          <path d="M2 6.5C5.13376 6.5 6.5 5.18153 6.5 2C6.5 5.18153 7.85669 6.5 11 6.5C7.85669 6.5 6.5 7.85669 6.5 11C6.5 7.85669 5.13376 6.5 2 6.5Z"/>
        </svg>
      }
    </button>

    <textarea
      #textarea
      class="message-input__textarea"
      [(ngModel)]="messageText"
      (input)="onInput()"
      (blur)="onBlur()"
      (keydown)="onKeyDown($event)"
      placeholder="Escribe un mensaje..."
      rows="1"
      [disabled]="isSending()"
    ></textarea>
    <button
      type="button"
      class="message-input__send-button"
      (click)="messageText.trim() && sendMessage()"
      [class.message-input__send-button--disabled]="!messageText.trim() || isSending()"
      aria-label="Enviar mensaje"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M3.29106 3.3088C3.00745 3.18938 2.67967 3.25533 2.4643 3.47514C2.24894 3.69495 2.1897 4.02401 2.31488 4.30512L5.40752 11.25H13C13.4142 11.25 13.75 11.5858 13.75 12C13.75 12.4142 13.4142 12.75 13 12.75H5.40754L2.31488 19.6949C2.1897 19.976 2.24894 20.3051 2.4643 20.5249C2.67967 20.7447 3.00745 20.8107 3.29106 20.6912L22.2911 12.6913C22.5692 12.5742 22.75 12.3018 22.75 12C22.75 11.6983 22.5692 11.4259 22.2911 11.3088L3.29106 3.3088Z" fill="currentColor"/>
      </svg>
    </button>
  </div>
</div>
