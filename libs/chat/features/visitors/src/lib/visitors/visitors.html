<div class="visitors-page">
  <!-- Screen reader live region for auto-refresh announcements -->
  <div class="sr-only" aria-live="polite" aria-atomic="true">{{ ariaAnnouncement() }}</div>
  <!-- Grid Bento principal -->
  <div class="visitors-grid bento-grid bento-grid--4-cols bento-grid--comfortable">
    <!-- Panel principal - Lista de visitantes -->
    <div class="bento-card bento-card--4x3 visitors-panel">
      <div class="bento-card-header">
        <h3 class="bento-card-title">Lista de Visitantes</h3>
        <div class="header-actions">
          @if (lastRefreshTime()) {
            <span class="last-refresh-indicator">
              Actualizado {{ timeSinceLastRefresh() }}
            </span>
          }
          <div class="auto-refresh-selector">
            <svg width="14" height="14" stroke-width="1.8" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 2L15 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
              <path d="M12 10L12 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
              <path d="M12 22C16.4183 22 20 18.4183 20 14C20 9.58172 16.4183 6 12 6C7.58172 6 4 9.58172 4 14C4 18.4183 7.58172 22 12 22Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            <select
              class="refresh-interval-select"
              (change)="onAutoRefreshIntervalChange(+$any($event.target).value)"
            >
              @for (option of autoRefreshOptions; track option.value) {
                <option [value]="option.value" [selected]="autoRefreshInterval() === option.value">{{ option.label }}</option>
              }
            </select>
          </div>
          <button
            type="button"
            class="refresh-button"
            (click)="refreshVisitorsSilently()"
            [disabled]="state().loading || isRefreshing()"
            [class.refresh-button--loading]="isRefreshing()"
            title="Refrescar lista de visitantes"
          >
            <svg width="18" height="18" stroke-width="1.8" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M21.8883 13.5C21.1645 18.3113 17.013 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C16.1006 2 19.6248 4.46819 21.1679 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
              <path d="M17 8H21.4C21.7314 8 22 7.73137 22 7.4V3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
        </div>
      </div>
      
      <div class="bento-card-content visitors-panel__content">
        <!-- Filtros rápidos y activos -->
        <div class="visitors-panel__filters">
          <guiders-visitors-quick-filters
            [filters]="quickFilters()"
            [activeFilterId]="selectedFilterId()"
            [loading]="state().loading"
            [savedFilters]="savedFilters()"
            [selectedSavedFilterId]="selectedSavedFilterId()"
            (filterSelect)="onQuickFilterSelect($event)"
            (savedFilterSelect)="onSavedFilterSelect($event)"
            (savedFilterDelete)="onSavedFilterDelete($event)"
          />

          <guiders-visitors-active-filters
            [filters]="activeSearchFilters()"
            (removeFilter)="onFilterRemove($event)"
            (clearAll)="onFiltersClearAll()"
            (openAdvanced)="onOpenAdvancedFilters()"
          />
        </div>

        @if (state().error) {
          <div class="error-content">
            <span class="error-text">{{ state().error }}</span>
            <button class="retry-button" (click)="loadVisitors()">
              Reintentar
            </button>
          </div>
        } @else {
          <!-- Área con scroll solo para la lista -->
          <div class="visitors-panel__list-container">
            <lib-visitors-list
              [visitors]="filteredVisitors()"
              [loading]="state().loading"
              [error]="state().error"
              [config]="listConfig()"
              [selectedVisitorIds]="[]"
              [externalSort]="activeSearchSort()"
              [unreadVisitorIds]="unreadVisitorIds()"
              [isLoadingMore]="isLoadingMore()"
              [hasMore]="hasMore()"
              [lastBatchStartIndex]="lastBatchStartIndex()"
              (visitorClick)="onVisitorClick($event)"
              (visitorSelect)="onVisitorSelect($event)"
              (createChat)="onCreateChat($event)"
              (viewPendingChats)="onViewPendingChats($event)"
              (takePendingChat)="onTakePendingChatAutomatically($event)"
              (operationCompleted)="onOperationCompleted($event)"
              (searchChange)="onSearchChange($event)"
              (filterChange)="onFilterChange($event)"
              (sortChange)="onSortChange($event)"
              (openChat)="onOpenChat($event)"
              (openWidget)="onOpenWidget($event)"
              (viewDetails)="onViewVisitorDetails($event)"
              (registerVisitorChatsEvent)="onRegisterVisitorChats($event)"
              (loadMore)="onLoadMore()"
            />
          </div>
        }
      </div>
    </div>

  <!-- Modal de filtros avanzados -->
  <guiders-visitors-advanced-filters
    [isOpen]="advancedFiltersOpen()"
    [currentFilters]="activeSearchFilters()"
    [currentSort]="activeSearchSort()"
    (apply)="onAdvancedFiltersApply($event)"
    (closePanel)="onCloseAdvancedFilters()"
    (saveFilter)="onRequestSaveFilter($event)"
  />

  <!-- Diálogo para guardar filtro -->
  <guiders-save-filter-dialog
    [isOpen]="saveDialogOpen()"
    [currentFilterCount]="savedFilters().length"
    [maxFilters]="20"
    (saveFilter)="onSaveFilter($event)"
    (cancelDialog)="onCancelSaveDialog()"
  />
