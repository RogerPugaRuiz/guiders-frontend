<div class="visitors-page">
  <!-- Título simplificado -->
  <div class="visitors-header-card bento-card bento-card--3x1">
    <div class="page-header">
      <div class="page-info">
        <h1 class="page-title">
          Visitantes - {{ getFilterDescription(selectedFilterId()) }}
        </h1>
        <p class="page-description">Gestiona visitantes y crea chats proactivos</p>
      </div>
    </div>
  </div>

  <!-- Grid Bento principal -->
  <div class="visitors-grid bento-grid bento-grid--4-cols bento-grid--comfortable">
    
    <!-- KPI Cards - Estadísticas -->
    <guiders-bento-kpi
      size="1x1"
      variant="neutral"
      title="Total"
      [value]="visitorStats().total"
    />
    
    <guiders-bento-kpi
      size="1x1"
      variant="success"
      title="En Línea"
      [value]="visitorStats().online"
      [trend]="{ value: 12, direction: 'up' }"
    />
    
    <guiders-bento-kpi
      size="1x1"
      variant="primary"
      title="Con Chat"
      [value]="visitorStats().withActiveChat"
    />
    
    <guiders-bento-kpi
      size="1x1"
      variant="warning"
      title="Leads"
      [value]="visitorStats().leads"
      [trend]="{ value: 8, direction: 'up' }"
    />

    <!-- Panel principal - Lista de visitantes -->
    <div class="bento-card bento-card--4x3">
      <div class="bento-card-header">
        <h3 class="bento-card-title">Lista de Visitantes</h3>
      </div>
      
      <div class="bento-card-content">
                @if (state().error) {
          <div class="error-content">
            <span class="error-text">{{ state().error }}</span>
            <button class="retry-button" (click)="loadVisitors()">
              Reintentar
            </button>
          </div>
        } @else {
          <lib-visitors-list
            [visitors]="filteredVisitors()"
            [loading]="state().loading"
            [error]="state().error"
            [config]="listConfig()"
            [selectedVisitorIds]="[]"
            (visitorClick)="onVisitorClick($event)"
            (visitorSelect)="onVisitorSelect($event)"
            (createChat)="onCreateChat($event)"
            (searchChange)="onSearchChange($event)"
            (filterChange)="onFilterChange($event)"
            (sortChange)="onSortChange($event)"
          />
        }
      </div>
    </div>

  <!-- Modal para crear chat -->
  @if (selectedVisitorForChat()) {
    <lib-create-chat-modal
      [visitor]="selectedVisitorForChat()!"
      [isOpen]="showCreateChatModal()"
      [loading]="state().loading"
      [config]="modalConfig()"
      (modalClose)="closeCreateChatModal()"
      (createChat)="onModalCreateChat($event)"
