<div class="toast toast--{{ toast().type }}" role="alert">
  <div class="toast__content">
    <span class="toast__icon">{{ getIconClass() }}</span>
    <span class="toast__message">{{ toast().message }}</span>
  </div>
  <button 
    class="toast__close" 
    type="button"
    aria-label="Cerrar notificación"
    (click)="onClose()">
    ✕
  </button>
</div>
