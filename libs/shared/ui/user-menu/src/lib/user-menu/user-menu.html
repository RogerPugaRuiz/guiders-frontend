<div
  #menuElement
  class="user-menu"
  [class.user-menu--compact]="compact()"
  [class.user-menu--dark]="true"
  [class.user-menu--light]="false"
  (click)="toggleDropdown()"
  (keydown.enter)="toggleDropdown()"
  (keydown.space)="toggleDropdown()"
  tabindex="0"
  role="button"
  aria-haspopup="true"
  [attr.aria-expanded]="isDropdownOpen()"
>
  <!-- Avatar del usuario -->
  <div
    class="user-menu__avatar"
    [style.background-color]="getAvatarBackgroundColor()"
  >
    <span class="user-menu__initial">{{ getUserInitials() }}</span>
    <!-- Indicador de estado de conexión -->
    <span
      class="user-menu__status-badge"
      [class.user-menu__status-badge--success]="statusService.getStatusColor() === 'success'"
      [class.user-menu__status-badge--danger]="statusService.getStatusColor() === 'danger'"
      [class.user-menu__status-badge--warning]="statusService.connectionStatus() === 'online' && !statusService.isActive()"
      [attr.aria-label]="statusService.getStatusText()"
      [attr.title]="statusService.getStatusText()"
    >
    </span>
  </div>

  <!-- Información del usuario (solo visible cuando no está compacto) -->
  @if (!compact()) {
  <div class="user-menu__info">
    @if (userName()) {
    <span class="user-menu__name">{{ userName() }}</span>
    }
    <span class="user-menu__email">{{ userEmail() }}</span>
  </div>
  }
</div>

<!-- Dropdown flotante renderizado fuera del contenedor -->
@if (isDropdownOpen() && dropdownPosition()) {
<div
  class="user-menu__dropdown-overlay"
  (click)="closeDropdown()"
  (keydown.escape)="closeDropdown()"
  role="button"
  tabindex="-1"
  aria-label="Cerrar menú"
>
  <div
    class="user-menu__dropdown"
    (click)="$event.stopPropagation()"
    (keydown)="$event.stopPropagation()"
    [style.bottom.px]="dropdownPosition()!.bottom"
    [style.left.px]="dropdownPosition()!.left"
    role="menu"
    tabindex="0"
  >
    <!-- Header con info del usuario -->
    <div class="user-menu__dropdown-header">
      <div class="user-menu__dropdown-avatar" [style.background-color]="getAvatarBackgroundColor()">
        <span class="user-menu__dropdown-avatar-initial">{{ getUserInitials() }}</span>
      </div>
      <div class="user-menu__dropdown-header-info">
        @if (userName()) {
        <span class="user-menu__dropdown-header-name">{{ userName() }}</span>
        }
        <span class="user-menu__dropdown-header-email">{{ userEmail() }}</span>
      </div>
    </div>

    <div class="user-menu__dropdown-divider"></div>

    <!-- Perfil -->
    <button
      type="button"
      class="user-menu__dropdown-item"
      (click)="onConfigureAccount()"
      role="menuitem"
    >
      <span class="user-menu__dropdown-item-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
      </span>
      <span class="user-menu__dropdown-item-body">
        <span class="user-menu__dropdown-item-label">Perfil</span>
        <span class="user-menu__dropdown-item-desc">Gestiona tu cuenta y preferencias</span>
      </span>
    </button>

    <!-- Cambiar app -->
    @if (showAppSwitcher() && appSwitcherUrl()) {
    <button
      type="button"
      class="user-menu__dropdown-item user-menu__dropdown-item--accent"
      (click)="onSwitchApp()"
      role="menuitem"
    >
      <span class="user-menu__dropdown-item-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 3H5a2 2 0 0 0-2 2v4"/><path d="M9 21H5a2 2 0 0 1-2-2v-4"/><path d="M15 3h4a2 2 0 0 1 2 2v4"/><path d="M15 21h4a2 2 0 0 0 2-2v-4"/><rect width="10" height="10" x="7" y="7" rx="1"/></svg>
      </span>
      <span class="user-menu__dropdown-item-body">
        <span class="user-menu__dropdown-item-label">{{ appSwitcherLabel() }}</span>
        <span class="user-menu__dropdown-item-desc">Ir a otra aplicación</span>
      </span>
    </button>
    }

    <div class="user-menu__dropdown-divider"></div>

    <!-- Cerrar sesión -->
    <button
      type="button"
      class="user-menu__dropdown-item user-menu__dropdown-item--danger"
      (click)="onLogout()"
      role="menuitem"
    >
      <span class="user-menu__dropdown-item-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </span>
      <span class="user-menu__dropdown-item-body">
        <span class="user-menu__dropdown-item-label">Cerrar sesión</span>
        <span class="user-menu__dropdown-item-desc">Salir de tu cuenta actual</span>
      </span>
    </button>
  </div>
</div>
}
