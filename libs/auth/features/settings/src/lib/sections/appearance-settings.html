<lib-settings-section-header
  title="Apariencia"
  description="Personaliza el aspecto visual de la plataforma">
</lib-settings-section-header>

<lib-settings-row
  label="Tema"
  description="Elige una identidad visual. El cambio es inmediato."
  [stacked]="true">
  <div class="theme-groups">
    <div class="theme-group">
      <p class="theme-group__label">Oscuros</p>
      <div class="theme-grid">
        @for (theme of darkThemes; track theme.id) {
          <button
            type="button"
            class="theme-card"
            [class.active]="themeService.theme() === theme.id"
            (click)="onSelectTheme(theme.id)"
            [attr.aria-pressed]="themeService.theme() === theme.id"
            [attr.aria-label]="'Tema ' + theme.label">
            <div class="theme-swatch" [style.background-color]="theme.bg">
              <div class="theme-swatch__accent" [style.background-color]="theme.accent"></div>
            </div>
            <span class="theme-card__label">{{ theme.label }}</span>
            @if (themeService.theme() === theme.id) {
              <span class="theme-card__check" aria-hidden="true">✓</span>
            }
          </button>
        }
      </div>
    </div>

    <div class="theme-group">
      <p class="theme-group__label">Claros</p>
      <div class="theme-grid">
        @for (theme of lightThemes; track theme.id) {
          <button
            type="button"
            class="theme-card"
            [class.active]="themeService.theme() === theme.id"
            (click)="onSelectTheme(theme.id)"
            [attr.aria-pressed]="themeService.theme() === theme.id"
            [attr.aria-label]="'Tema ' + theme.label">
            <div class="theme-swatch" [style.background-color]="theme.bg">
              <div class="theme-swatch__accent" [style.background-color]="theme.accent"></div>
            </div>
            <span class="theme-card__label">{{ theme.label }}</span>
            @if (themeService.theme() === theme.id) {
              <span class="theme-card__check" aria-hidden="true">✓</span>
            }
          </button>
        }
      </div>
    </div>
  </div>
</lib-settings-row>

<lib-settings-row
  label="Densidad"
  description="Próximamente: ajusta el espaciado de la interfaz">
  <span class="placeholder-pill">Próximamente</span>
</lib-settings-row>

<lib-settings-row
  label="Idioma"
  description="Próximamente: cambia el idioma de la interfaz">
  <span class="placeholder-pill">Español</span>
</lib-settings-row>
