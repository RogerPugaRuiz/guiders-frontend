@if (redirectService.isOpen()) {
  <div class="redirect-confirm__backdrop" (click)="onBackdropClick($event)" (keydown.enter)="onBackdropClick($event)" tabindex="0" role="button">
    <div class="redirect-confirm__dialog">
      <div class="redirect-confirm__icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>

      <h2 class="redirect-confirm__title">{{ redirectService.data()?.title }}</h2>

      <p class="redirect-confirm__message">{{ redirectService.data()?.message }}</p>

      <div class="redirect-confirm__actions">
        <button
          type="button"
          class="redirect-confirm__btn redirect-confirm__btn--secondary"
          (click)="onCancel()">
          {{ redirectService.data()?.cancelText }}
        </button>
        <button
          type="button"
          class="redirect-confirm__btn redirect-confirm__btn--primary"
          (click)="onConfirm()">
          {{ redirectService.data()?.confirmText }}
        </button>
      </div>
    </div>
  </div>
}
