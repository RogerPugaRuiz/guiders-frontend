<div class="guiders-login-container">
	<div class="guiders-login-content">
		<div class="guiders-login-header">
			<h1 class="guiders-login-title">Iniciar sesión</h1>
			<p class="guiders-login-subtitle">Bienvenido al sistema Guiders.<br>Inicia sesión en tu cuenta para continuar.</p>
		</div>
		
		<form 
			class="guiders-login-form" 
			[formGroup]="loginForm" 
			(ngSubmit)="onSubmit()">
			
			<!-- Campo Email -->
			<guiders-text-field
				label="Correo electrónico"
				type="email"
				placeholder="tu@email.com"
				size="large"
				[required]="true"
				[disabled]="disabled() || isLoading()"
				[errorMessage]="getEmailErrorMessage()"
				[formControl]="emailControl()">
			</guiders-text-field>

			<!-- Campo Contraseña -->
			<guiders-text-field
				label="Contraseña"
				type="password"
				placeholder="••••••••"
				size="large"
				[required]="true"
				[disabled]="disabled() || isLoading()"
				[errorMessage]="getPasswordErrorMessage()"
				[formControl]="passwordControl()">
			</guiders-text-field>

			<!-- Botón de envío -->
			<div class="guiders-login-actions">
				<guiders-button 
					type="submit"
					variant="primary"
					size="large"
					[disabled]="isSubmitDisabled()"
					[loading]="isLoading()"
					class="guiders-login-submit">
					Iniciar sesión
				</guiders-button>
			</div>

			<!-- Mensaje de error global -->
			@if (errorMessage()) {
				<div class="guiders-login-error" role="alert" aria-live="polite">
					<span class="guiders-login-error-icon">⚠️</span>
					<span class="guiders-login-error-text">{{ errorMessage() }}</span>
				</div>
			}

			<!-- Enlaces adicionales -->
			<div class="guiders-login-links">
				<guiders-button 
					variant="ghost"
					size="medium"
					type="button"
					(click)="onForgotPassword()">
					¿Olvidaste tu contraseña?
				</guiders-button>
			</div>

			<div class="guiders-login-signup">
				<span class="guiders-login-signup-text">¿No tienes una cuenta?</span>
				<guiders-button 
					variant="ghost"
					size="medium"
					type="button"
					(click)="onSignUp()">
					Registrarse
				</guiders-button>
			</div>
		</form>
	</div>
</div>
