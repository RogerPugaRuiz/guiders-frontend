<svg width="280" height="220" viewBox="0 0 280 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circles - subtle, adapts to theme -->
  <circle cx="140" cy="110" r="90" fill="currentColor" fill-opacity="0.03"/>
  <circle cx="140" cy="110" r="65" fill="currentColor" fill-opacity="0.05"/>
  
  <!-- Main chat bubble - left -->
  <g transform="translate(55, 50)">
    <rect x="0" y="0" width="80" height="55" rx="12" fill="currentColor" fill-opacity="0.08"/>
    <rect x="0" y="0" width="80" height="55" rx="12" stroke="currentColor" stroke-opacity="0.15" stroke-width="1.5"/>
    <!-- Message lines -->
    <rect x="12" y="14" width="45" height="6" rx="3" fill="currentColor" fill-opacity="0.2"/>
    <rect x="12" y="26" width="56" height="6" rx="3" fill="currentColor" fill-opacity="0.15"/>
    <rect x="12" y="38" width="32" height="6" rx="3" fill="currentColor" fill-opacity="0.1"/>
    <!-- Tail -->
    <path d="M15 55 L15 68 L28 55" fill="currentColor" fill-opacity="0.08"/>
    <path d="M15 55 L15 68 L28 55" stroke="currentColor" stroke-opacity="0.15" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  
  <!-- Main chat bubble - right -->
  <g transform="translate(145, 75)">
    <rect x="0" y="0" width="80" height="55" rx="12" fill="currentColor" fill-opacity="0.12"/>
    <rect x="0" y="0" width="80" height="55" rx="12" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- Message lines -->
    <rect x="12" y="14" width="56" height="6" rx="3" fill="currentColor" fill-opacity="0.25"/>
    <rect x="12" y="26" width="40" height="6" rx="3" fill="currentColor" fill-opacity="0.2"/>
    <rect x="12" y="38" width="50" height="6" rx="3" fill="currentColor" fill-opacity="0.15"/>
    <!-- Tail -->
    <path d="M65 55 L65 68 L52 55" fill="currentColor" fill-opacity="0.12"/>
    <path d="M65 55 L65 68 L52 55" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="60" cy="160" r="4" fill="currentColor" fill-opacity="0.1"/>
  <circle cx="220" cy="50" r="5" fill="currentColor" fill-opacity="0.08"/>
  <circle cx="240" cy="160" r="3" fill="currentColor" fill-opacity="0.12"/>
  <circle cx="45" cy="80" r="3" fill="currentColor" fill-opacity="0.06"/>
  
  <!-- Connection indicator dots between bubbles -->
  <circle cx="140" cy="95" r="2.5" fill="currentColor" fill-opacity="0.3"/>
  <circle cx="140" cy="105" r="2" fill="currentColor" fill-opacity="0.2"/>
  <circle cx="140" cy="113" r="1.5" fill="currentColor" fill-opacity="0.15"/>
</svg>
