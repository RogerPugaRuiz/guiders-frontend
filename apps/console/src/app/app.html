<div class="console-app">
  <guiders-sidebar
    data-tour="sidebar"
    [items]="sidebarItems()"
    [config]="sidebarConfig()"
    [userEmail]="currentUser()?.email ?? null"
    [userName]="null"
    [showAppSwitcher]="isAdmin()"
    [appSwitcherLabel]="'Ir a Admin'"
    [appSwitcherUrl]="adminUrl"
    [appVersion]="appVersion"
    [showTourButton]="true"
    (itemClick)="onSidebarItemClick($event)"
    (toggleSidebar)="onSidebarToggle($event)"
    (userLogout)="onLogout()"
    (userConfigureAccount)="onConfigureAccount()"
    (userStartTour)="onStartTour($event)">
  </guiders-sidebar>

  <div class="console-main">
    <main class="console-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Chat Widget - Fixed en esquina inferior derecha -->
  <guiders-chat-widget></guiders-chat-widget>
</div>
