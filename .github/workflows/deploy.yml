name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: 20
  STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
  STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
  STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
  STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  deployments: write
  issues: write
  pull-requests: write

jobs:
  ci:
    name: CI (lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci --legacy-peer-deps
      - run: npx nx run-many -t lint test build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Validate backend secrets
        env:
          BACKEND_REPO: ${{ secrets.BACKEND_REPO }}
          BACKEND_REPO_TOKEN: ${{ secrets.BACKEND_REPO_TOKEN }}
        run: |
          if [ -z "$BACKEND_REPO" ]; then
            echo "❌ BACKEND_REPO secret not set." && exit 1
          fi
          if [ -z "$BACKEND_REPO_TOKEN" ]; then
            echo "❌ BACKEND_REPO_TOKEN secret not set." && exit 1
          fi
          echo "✅ Backend secrets present."

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.BACKEND_REPO }}
          token: ${{ secrets.BACKEND_REPO_TOKEN }}
          path: _backend

      - name: Start backend E2E stack
        working-directory: _backend
        run: |
          docker compose -f docker-compose.e2e.yml up -d

      - name: Wait for backend
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:3099/api/tracking-v2/health; do sleep 3; done'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4200
          E2E_API_URL: http://localhost:3099
        run: npx nx e2e console-e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dist/.playwright/apps/console-e2e/playwright-report/
          retention-days: 7

      - name: Teardown backend
        if: always()
        run: docker compose -f _backend/docker-compose.e2e.yml down -v --remove-orphans || true

  deploy:
    name: Build & Deploy
    needs: [ci, e2e]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy-url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Set APP_VERSION from git tag
        run: |
          set -e
          APP_VER=$(git describe --tags --abbrev=0)
          APP_VER=${APP_VER#v}
          echo "APP_VERSION=$APP_VER" >> $GITHUB_ENV

      - name: Inject APP_VERSION into environment files
        run: |
          set -e
          find apps -name "environment*.ts" | while read f; do
            sed -i "s/0\.0\.0-local/$APP_VERSION/g" "$f"
          done

      - name: Build (staging)
        run: npx nx run-many -t build --configuration=production --projects=admin,console --parallel

      - name: Publish artefacto admin
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: dist/apps/admin/**
          if-no-files-found: error

      - name: Publish artefacto console
        uses: actions/upload-artifact@v4
        with:
          name: console-dist
          path: dist/apps/console/**
          if-no-files-found: error

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Install WireGuard
        run: sudo apt-get update && sudo apt-get install -y wireguard

      - name: Configure WireGuard
        env:
          WG_PK: ${{ secrets.WG_PRIVATE_KEY }}
          WG_ENDPOINT: ${{ secrets.WG_SERVER_ENDPOINT }}
        run: |
          set -euo pipefail
          if [ -z "$WG_PK" ]; then echo "🔕 WG_PRIVATE_KEY no definido. Omitiendo WireGuard."; exit 0; fi
          if [ -z "$WG_ENDPOINT" ]; then echo "❌ Falta WG_SERVER_ENDPOINT"; exit 1; fi
          WG_PK_CLEAN=$(printf '%s' "$WG_PK" | tr -d '"\r\n' | xargs)
          if ! echo "$WG_PK_CLEAN" | grep -Eq '^[A-Za-z0-9+/]{43}=$|^[A-Za-z0-9+/]{44}$'; then
            echo "❌ Formato inválido de WG_PRIVATE_KEY."; exit 1;
          fi
          echo "🔑 Clave WireGuard validada."
          sudo mkdir -p /etc/wireguard && sudo chmod 700 /etc/wireguard
          cat > github.conf <<'CFG'
          [Interface]
          PrivateKey = REPLACE_PRIVATE_KEY
          Address = 10.0.0.4/24
          [Peer]
          PublicKey = rcfGmqdqyiQs+J81rx5mabiyAjQkvoDfiCTD2eLqaHQ=
          Endpoint = WG_ENDPOINT_PLACEHOLDER:51820
          AllowedIPs = 10.0.0.0/24
          PersistentKeepalive = 25
          CFG
          sed -i "s#REPLACE_PRIVATE_KEY#$WG_PK_CLEAN#" github.conf
          sed -i "s#WG_ENDPOINT_PLACEHOLDER#$WG_ENDPOINT#" github.conf
          sudo mv github.conf /etc/wireguard/github.conf
          sudo chmod 600 /etc/wireguard/github.conf
          if sudo wg show github >/dev/null 2>&1; then sudo wg-quick down github || true; fi
          sudo wg-quick up github || { echo "❌ Error al levantar WireGuard"; exit 1; }

      - name: Verify VPN connection
        env:
          WG_PK: ${{ secrets.WG_PRIVATE_KEY }}
          VPN_TARGET_HOST: ${{ env.STAGING_SSH_HOST }}
        run: |
          set -e
          if [ -z "$VPN_TARGET_HOST" ]; then echo "❌ Falta STAGING_SSH_HOST"; exit 1; fi
          VPN_SERVER_IP=""
          for server_ip in 10.0.0.1 10.0.0.254; do
            if timeout 3 ping -c 1 -W 2 "$server_ip" >/dev/null 2>&1; then VPN_SERVER_IP="$server_ip"; break; fi
          done
          if [ -z "$VPN_SERVER_IP" ]; then echo "❌ Servidor VPN no responde"; exit 1; fi
          if ! ping -c 2 -W 5 "$VPN_TARGET_HOST" >/dev/null 2>&1; then echo "❌ STAGING no alcanzable via VPN"; exit 1; fi
          echo "✅ VPN OK"

      - name: Prepare release timestamp
        id: release_time
        run: echo "RELEASE_TIMESTAMP=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Validate SSH credentials
        if: env.STAGING_SSH_HOST != ''
        env:
          PASS: ${{ secrets.STAGING_SSH_PASSWORD }}
        run: |
          if [ -z "$PASS" ]; then echo "❌ Falta STAGING_SSH_PASSWORD" && exit 1; fi
          echo "ℹ️ Usando autenticación por contraseña."

      - name: Test SSH connection
        if: env.STAGING_SSH_HOST != ''
        env:
          SSH_HOST: ${{ env.STAGING_SSH_HOST }}
          SSH_USER: ${{ env.STAGING_SSH_USER }}
          SSH_PORT: ${{ env.STAGING_SSH_PORT }}
        run: |
          set -e
          PORT=${SSH_PORT:-22}
          export SSHPASS="${{ secrets.STAGING_SSH_PASSWORD }}"
          attempts=0; ok=0
          while [ $attempts -lt 3 ]; do
            if sshpass -e ssh -o StrictHostKeyChecking=no -o PreferredAuthentications=password -p "$PORT" "$SSH_USER@$SSH_HOST" 'echo OK' >/dev/null 2>&1; then ok=1; break; fi
            attempts=$((attempts+1)); echo "⚠️ Intento $attempts..."; sleep 2
          done
          if [ $ok -ne 1 ]; then echo "❌ SSH fallido tras 3 intentos" && exit 1; fi
          echo "✅ SSH OK"

      - name: Create release structure
        if: env.STAGING_SSH_HOST != ''
        env:
          SSH_HOST: ${{ env.STAGING_SSH_HOST }}
          SSH_USER: ${{ env.STAGING_SSH_USER }}
          SSH_PORT: ${{ env.STAGING_SSH_PORT }}
          DEPLOY_PATH: ${{ env.STAGING_DEPLOY_PATH }}
          RELEASE_TIMESTAMP: ${{ env.RELEASE_TIMESTAMP }}
        run: |
          set -e
          PORT=${SSH_PORT:-22}
          export SSHPASS="${{ secrets.STAGING_SSH_PASSWORD }}"
          SSH_BASE="sshpass -e ssh -o StrictHostKeyChecking=no -o PreferredAuthentications=password -p $PORT"
          $SSH_BASE "$SSH_USER@$SSH_HOST" "\
            set -e; mkdir -p $DEPLOY_PATH/releases/$RELEASE_TIMESTAMP/admin $DEPLOY_PATH/releases/$RELEASE_TIMESTAMP/console; echo 'EstructuraOK';"

      - name: Upload files (rsync)
        if: env.STAGING_SSH_HOST != ''
        env:
          SSH_HOST: ${{ env.STAGING_SSH_HOST }}
          SSH_USER: ${{ env.STAGING_SSH_USER }}
          SSH_PORT: ${{ env.STAGING_SSH_PORT }}
          DEPLOY_PATH: ${{ env.STAGING_DEPLOY_PATH }}
          RELEASE_TIMESTAMP: ${{ env.RELEASE_TIMESTAMP }}
        run: |
          set -e
          PORT=${SSH_PORT:-22}
          export SSHPASS="${{ secrets.STAGING_SSH_PASSWORD }}"
          RSYNC_SSH="sshpass -e ssh -p $PORT -o StrictHostKeyChecking=no -o PreferredAuthentications=password"
          echo "📦 rsync admin..."
          rsync -az --delete -e "$RSYNC_SSH" dist/apps/admin/browser/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/releases/$RELEASE_TIMESTAMP/admin/"
          echo "📦 rsync console..."
          rsync -az --delete -e "$RSYNC_SSH" dist/apps/console/browser/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/releases/$RELEASE_TIMESTAMP/console/"

      - name: Activate release (symlink swap)
        if: env.STAGING_SSH_HOST != ''
        env:
          SSH_HOST: ${{ env.STAGING_SSH_HOST }}
          SSH_USER: ${{ env.STAGING_SSH_USER }}
          SSH_PORT: ${{ env.STAGING_SSH_PORT }}
          DEPLOY_PATH: ${{ env.STAGING_DEPLOY_PATH }}
          RELEASE_TIMESTAMP: ${{ env.RELEASE_TIMESTAMP }}
        run: |
          set -e
          PORT=${SSH_PORT:-22}
          export SSHPASS="${{ secrets.STAGING_SSH_PASSWORD }}"
          SSH_BASE="sshpass -e ssh -o StrictHostKeyChecking=no -o PreferredAuthentications=password -p $PORT"
          $SSH_BASE "$SSH_USER@$SSH_HOST" "\
            set -e; ln -sfn $DEPLOY_PATH/releases/$RELEASE_TIMESTAMP $DEPLOY_PATH/current; echo 'SymlinkOK';"

      - name: Skip deploy if no secrets
        if: env.STAGING_SSH_HOST == ''
        run: |
          echo '[INFO] Saltando despliegue: STAGING_SSH_HOST no está definido.'

      - name: Summary
        run: |
          VERSION=${APP_VERSION:-$(node -p "require('./package.json').version")}
          echo "## Despliegue" >> $GITHUB_STEP_SUMMARY
          echo "- **Versión**: \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`$GITHUB_SHA\`" >> $GITHUB_STEP_SUMMARY
          echo "- Build y artefactos listos." >> $GITHUB_STEP_SUMMARY
