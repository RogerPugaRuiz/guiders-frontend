name: Deploy Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: 20
  PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
  PRODUCTION_SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
  PRODUCTION_SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT }}
  PRODUCTION_DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }} # Ej: /var/www/guiders-frontend
  # Usar PRODUCTION_SSH_PASSWORD para autenticación por contraseña

concurrency:
  group: production-deploy
  cancel-in-progress: false # En producción no cancelamos deploys en curso

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    name: Build & Deploy Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (production)
        run: npx nx run-many -t lint --projects=admin,console --parallel

      - name: Test (production)
        run: npx nx run-many -t test --projects=admin,console --parallel --configuration=ci || npx nx run-many -t test --projects=admin,console --parallel

      - name: Build (production configuration)
        run: npx nx run-many -t build --configuration=production --projects=admin,console --parallel

      - name: Publicar artefacto admin (production)
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist-production
          path: dist/apps/admin/**
          if-no-files-found: error

      - name: Publicar artefacto console (production)
        uses: actions/upload-artifact@v4
        with:
          name: console-dist-production
          path: dist/apps/console/**
          if-no-files-found: error

      # ===================== VPN / WireGuard =====================
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Install WireGuard
        run: sudo apt-get update && sudo apt-get install -y wireguard

      - name: Configure WireGuard (github.conf)
        env:
          WG_PK: ${{ secrets.WG_PRIVATE_KEY }}
          WG_ENDPOINT: ${{ secrets.WG_SERVER_ENDPOINT }}
        run: |
          set -euo pipefail
          if [ -z "$WG_PK" ]; then echo "🔕 WG_PRIVATE_KEY no definido. Omitiendo WireGuard."; exit 0; fi
          if [ -z "$WG_ENDPOINT" ]; then echo "❌ Falta WG_SERVER_ENDPOINT"; exit 1; fi
          # Saneado y validación de la clave privada WireGuard
          WG_PK_CLEAN=$(printf '%s' "$WG_PK" | tr -d '"\r\n' | xargs)
          if ! echo "$WG_PK_CLEAN" | grep -Eq '^[A-Za-z0-9+/]{43}=$|^[A-Za-z0-9+/]{44}$'; then
            echo "❌ Formato inválido de WG_PRIVATE_KEY (longitud ${#WG_PK_CLEAN}). Debe ser salida de 'wg genkey' (44 chars base64)."; exit 1;
          fi
          echo "🔑 Clave WireGuard validada (longitud ${#WG_PK_CLEAN})."
          sudo mkdir -p /etc/wireguard && sudo chmod 700 /etc/wireguard
          cat > github.conf <<'CFG'
          [Interface]
          PrivateKey = REPLACE_PRIVATE_KEY
          Address = 10.0.0.4/24

          [Peer]
          PublicKey = rcfGmqdqyiQs+J81rx5mabiyAjQkvoDfiCTD2eLqaHQ=
          Endpoint = WG_ENDPOINT_PLACEHOLDER:51820
          AllowedIPs = 10.0.0.0/24
          PersistentKeepalive = 25
          CFG
          sed -i "s#REPLACE_PRIVATE_KEY#$WG_PK_CLEAN#" github.conf
          sed -i "s#WG_ENDPOINT_PLACEHOLDER#$WG_ENDPOINT#" github.conf
          sudo mv github.conf /etc/wireguard/github.conf
          sudo chmod 600 /etc/wireguard/github.conf
          if sudo wg show github >/dev/null 2>&1; then sudo wg-quick down github || true; fi
          sudo wg-quick up github || { echo "❌ Error al levantar WireGuard"; sudo wg-quick down github || true; exit 1; }

      - name: Verify VPN connection
        env:
          WG_PK: ${{ secrets.WG_PRIVATE_KEY }}
          VPN_TARGET_HOST: ${{ env.PRODUCTION_SSH_HOST }}
        run: |
          set -e
          if [ -z "$WG_PK" ]; then echo "🔕 Saltando verificación VPN (sin WG_PRIVATE_KEY)"; exit 0; fi
          if [ -z "$VPN_TARGET_HOST" ]; then echo "❌ Falta PRODUCTION_SSH_HOST (usado como host VPN)"; exit 1; fi
          echo "🔍 Verificando conexión VPN..."
          echo "📋 Estado de WireGuard:"; sudo wg show || true
          echo "\n📋 Interfaces WireGuard activas:"; ip link show type wireguard 2>/dev/null || echo "No se encontraron interfaces WireGuard"
          echo "\n📋 IPs asignadas:"; for iface in $(ip link show type wireguard 2>/dev/null | grep -o 'wg[^:]*' || echo ""); do [ -n "$iface" ] && echo "  $iface:" && ip addr show "$iface" | grep -E "inet " | sed 's/^/    /'; done
          echo "\n📋 Rutas VPN:"; ip route | grep -E "10\.0\.0\.|wg" || echo "No se encontraron rutas VPN"
          echo "\n🏓 Ping endpoints internos (10.0.0.1 / 10.0.0.254):"
          VPN_SERVER_IP=""
          for server_ip in 10.0.0.1 10.0.0.254; do
            if timeout 3 ping -c 1 -W 2 "$server_ip" >/dev/null 2>&1; then
              echo "  ✅ $server_ip responde"; VPN_SERVER_IP="$server_ip"; break
            else
              echo "  ❌ $server_ip no responde"
            fi
          done
          if [ -z "$VPN_SERVER_IP" ]; then echo "❌ Servidor VPN interno no responde"; exit 1; fi
          echo "\n🎯 Probando acceso al servidor PRODUCTION (VPN/SSH host: $VPN_TARGET_HOST)";
          if ping -c 2 -W 5 "$VPN_TARGET_HOST" >/dev/null 2>&1; then
            echo "✅ Servidor PRODUCTION accesible vía VPN";
          else
            echo "❌ No se alcanza PRODUCTION_SSH_HOST ($VPN_TARGET_HOST) via VPN"; exit 1;
          fi

      - name: Add production server to known_hosts
        env:
          VPN_TARGET_HOST: ${{ env.PRODUCTION_SSH_HOST }}
        run: |
          if [ -z "$VPN_TARGET_HOST" ]; then echo "🔕 Sin PRODUCTION_SSH_HOST; omitido"; exit 0; fi
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPN_TARGET_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Preparar timestamp de release
        id: release_time
        run: echo "RELEASE_TIMESTAMP=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Validar credenciales SSH
        if: env.PRODUCTION_SSH_HOST != ''
        env:
          PASS: ${{ secrets.PRODUCTION_SSH_PASSWORD }}
        run: |
          if [ -z "$PASS" ]; then
            echo "❌ Falta PRODUCTION_SSH_PASSWORD. Añádela como secret." >&2
            exit 1
          fi
          echo "ℹ️ Usando autenticación por contraseña (sshpass)."

      - name: Probar conexión SSH
        if: env.PRODUCTION_SSH_HOST != ''
        env:
          SSH_HOST: ${{ env.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ env.PRODUCTION_SSH_USER }}
          SSH_PORT: ${{ env.PRODUCTION_SSH_PORT }}
          PASS: ${{ secrets.PRODUCTION_SSH_PASSWORD }}
        run: |
          set -e
          PORT=${SSH_PORT:-22}
          echo "🔍 Probando autenticación SSH por contraseña..."
          if [ -z "$PASS" ]; then echo "❌ Sin contraseña definida"; exit 1; fi
          # Usar variable de entorno para evitar problemas de comillas en la contraseña
          export SSHPASS="$PASS"
          attempts=0; ok=0
          while [ $attempts -lt 3 ]; do
            if sshpass -e ssh -o StrictHostKeyChecking=no \
                 -o UserKnownHostsFile=/dev/null \
                 -o PreferredAuthentications=password,keyboard-interactive \
                 -o PubkeyAuthentication=no -p "$PORT" "$SSH_USER@$SSH_HOST" 'echo OK' >/dev/null 2>&1; then
              ok=1; break
            fi
            attempts=$((attempts+1))
            echo "⚠️ Intento $attempts fallido..."; sleep 2
          done
          if [ $ok -ne 1 ]; then
            echo "❌ Falló autenticación por contraseña tras 3 intentos. Revisa: usuario, password, PasswordAuthentication en sshd_config y bloqueos de fail2ban." >&2
            exit 1
          fi
          echo "✅ Autenticación por contraseña exitosa"

      - name: Crear estructura de release en servidor
        if: env.PRODUCTION_SSH_HOST != ''
        env:
          SSH_HOST: ${{ env.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ env.PRODUCTION_SSH_USER }}
          SSH_PORT: ${{ env.PRODUCTION_SSH_PORT }}
          DEPLOY_PATH: ${{ env.PRODUCTION_DEPLOY_PATH }}
          RELEASE_TIMESTAMP: ${{ env.RELEASE_TIMESTAMP }}
          SSH_PASS: ${{ secrets.PRODUCTION_SSH_PASSWORD }}
        run: |
          set -e
          PORT=${SSH_PORT:-22}
          if [ -z "$SSH_PASS" ]; then echo "❌ Falta PRODUCTION_SSH_PASSWORD"; exit 1; fi
          export SSHPASS="$SSH_PASS"
          SSH_BASE="sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no -p $PORT"
          $SSH_BASE "$SSH_USER@$SSH_HOST" "\
            set -e; \
            BASE=\"$DEPLOY_PATH\"; \
            RELEASES=\"$DEPLOY_PATH/releases\"; \
            mkdir -p $DEPLOY_PATH $RELEASES $DEPLOY_PATH/shared; \
            mkdir -p $RELEASES/$RELEASE_TIMESTAMP/admin $RELEASES/$RELEASE_TIMESTAMP/console; \
            echo 'Estructura creada';"

      - name: Subir archivos (rsync)
        if: env.PRODUCTION_SSH_HOST != ''
        env:
          SSH_HOST: ${{ env.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ env.PRODUCTION_SSH_USER }}
          SSH_PORT: ${{ env.PRODUCTION_SSH_PORT }}
          DEPLOY_PATH: ${{ env.PRODUCTION_DEPLOY_PATH }}
          RELEASE_TIMESTAMP: ${{ env.RELEASE_TIMESTAMP }}
          SSH_PASS: ${{ secrets.PRODUCTION_SSH_PASSWORD }}
        run: |
          set -e
          PORT=${SSH_PORT:-22}
          echo "📦 Preparando transferencia a $DEPLOY_PATH/releases/$RELEASE_TIMESTAMP"
          if [ -z "$SSH_PASS" ]; then echo "❌ Falta PRODUCTION_SSH_PASSWORD"; exit 1; fi
          export SSHPASS="$SSH_PASS"
          RSYNC_SSH="sshpass -e ssh -p $PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no"
          SSH_BASE="$RSYNC_SSH"
          echo "📁 Verificando/creando directorios remotos..."
          $SSH_BASE "$SSH_USER@$SSH_HOST" "mkdir -p $DEPLOY_PATH/releases/$RELEASE_TIMESTAMP/admin $DEPLOY_PATH/releases/$RELEASE_TIMESTAMP/console" || { echo '❌ Error creando directorios remotos'; exit 1; }
          echo "✅ Directorios asegurados. Ejecutando rsync..."
          rsync -az --delete -e "$RSYNC_SSH" dist/apps/admin/browser/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/releases/$RELEASE_TIMESTAMP/admin/"
          rsync -az --delete -e "$RSYNC_SSH" dist/apps/console/browser/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/releases/$RELEASE_TIMESTAMP/console/"

      - name: Activar release (symlink swap)
        if: env.PRODUCTION_SSH_HOST != ''
        env:
          SSH_HOST: ${{ env.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ env.PRODUCTION_SSH_USER }}
          SSH_PORT: ${{ env.PRODUCTION_SSH_PORT }}
          DEPLOY_PATH: ${{ env.PRODUCTION_DEPLOY_PATH }}
          RELEASE_TIMESTAMP: ${{ env.RELEASE_TIMESTAMP }}
          SSH_PASS: ${{ secrets.PRODUCTION_SSH_PASSWORD }}
        run: |
          set -e
          PORT=${SSH_PORT:-22}
          if [ -z "$SSH_PASS" ]; then echo "❌ Falta PRODUCTION_SSH_PASSWORD"; exit 1; fi
          export SSHPASS="$SSH_PASS"
          SSH_BASE="sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no -p $PORT"
          $SSH_BASE "$SSH_USER@$SSH_HOST" "\
            set -e; \
            ln -sfn $DEPLOY_PATH/releases/$RELEASE_TIMESTAMP $DEPLOY_PATH/current; \
            echo 'Symlink actualizado -> current'; \
            if command -v systemctl >/dev/null 2>&1; then echo 'Opcional: systemctl reload nginx'; fi;"

      - name: Mostrar skip deploy si faltan secrets
        if: env.PRODUCTION_SSH_HOST == ''
        run: |
          echo '[INFO] Saltando despliegue: define PRODUCTION_SSH_HOST, PRODUCTION_SSH_USER, PRODUCTION_SSH_PASSWORD y PRODUCTION_DEPLOY_PATH.'

      - name: Summary
        run: |
          echo "## Despliegue Production" >> $GITHUB_STEP_SUMMARY
          echo "Build production completado y artefactos publicados." >> $GITHUB_STEP_SUMMARY
